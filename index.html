}

}

.balloons {

}

.balloon {
    width: 40px;
    height: 60px;
    background: red;
    border-radius: 50%;
    position: absolute;
    animation: float 6s infinite ease-in;
}

@keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
